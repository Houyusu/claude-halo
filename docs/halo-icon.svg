<!-- Claude Halo icon — idle state gray ring -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer glow -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="#cccccc" stroke-width="5.5"
          stroke-dasharray="105 52" stroke-linecap="round" opacity="0.45"/>
  <!-- Mid layer -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="#bbbbbb" stroke-width="3.2"
          stroke-dasharray="105 52" stroke-linecap="round" opacity="0.75"/>
  <!-- Core ring -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="#aaaaaa" stroke-width="1.8"
          stroke-dasharray="105 52" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2" fill="#cccccc" opacity="0.5"/>
</svg>
