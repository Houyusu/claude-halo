<!-- Claude Halo icon — thinking state orange ring -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer glow -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="#ffdbb8" stroke-width="5.5"
          stroke-dasharray="50 25 32 22 18 14" stroke-linecap="round" opacity="0.45"/>
  <!-- Mid layer -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="#ffaa60" stroke-width="3.2"
          stroke-dasharray="50 25 32 22 18 14" stroke-linecap="round" opacity="0.75"/>
  <!-- Core ring -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="#ff8830" stroke-width="1.8"
          stroke-dasharray="50 25 32 22 18 14" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2" fill="#ff8830" opacity="0.4"/>
</svg>
