name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build
        run: cargo build --release
        working-directory: win/src-tauri
      - uses: actions/upload-artifact@v4
        with:
          name: claude-halo-windows
          path: win/src-tauri/target/release/claude-halo.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build
        run: cargo build --release
        working-directory: mac/src-tauri
      - uses: actions/upload-artifact@v4
        with:
          name: claude-halo-macos
          path: mac/src-tauri/target/release/claude-halo
