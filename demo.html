<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Halo — 状态演示</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#0d0d0d;color:#ccc;font:15px/1.7 "Noto Serif SC",Georgia,"Songti SC","SimSun",serif;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    min-height:100vh;overflow-x:hidden;gap:24px;
    padding-top:64px;padding-bottom:64px;
  }
  header{
    text-align:center;padding:0 16px;
  }
  header h1{font-size:34px;font-weight:700;color:#eee;letter-spacing:4px}
  header p{font-size:14px;color:#555;margin-top:6px;font-style:italic}

  .canvas-wrap{
    position:relative;width:360px;height:360px;
    border-radius:50%;
    box-shadow:0 0 100px rgba(128,128,128,0.06);
  }
  canvas{display:block;width:100%;height:100%}

  .state-label{
    text-align:center;font-size:22px;font-weight:700;transition:color .3s;letter-spacing:1px;
  }
  .state-label.idle{color:#aaaaaa}
  .state-label.thinking{color:#ff8830}
  .state-label.executing{color:#3399ff}
  .state-label.input_needed{color:#ee3333}
  .state-label.completed{color:#33cc55}
  .state-label.compacting{color:#9944ff}

  .state-desc{
    text-align:center;font-size:14px;color:#444;margin-top:2px;transition:color .3s;
    max-width:400px;line-height:1.6;letter-spacing:0.5px;
  }

  /* ── State buttons with sliding highlighter ───────────────── */
  .state-picker{
    position:relative;
    display:flex;flex-wrap:wrap;gap:10px;justify-content:center;
  }
  .state-btn{
    position:relative;z-index:1;
    padding:9px 24px;border:1px solid transparent;border-radius:22px;
    background:transparent;color:#aaa;font-size:15px;cursor:pointer;transition:color .25s,border-color .25s;
    font-family:inherit;
  }
  .state-btn:hover{color:#ddd}

  .state-highlighter{
    position:absolute;z-index:0;pointer-events:none;
    border:1px solid #aaa;border-radius:22px;
    opacity:1;
    transition:left .45s cubic-bezier(.4,0,.2,1),
               top .45s cubic-bezier(.4,0,.2,1),
               width .45s cubic-bezier(.4,0,.2,1),
               height .45s cubic-bezier(.4,0,.2,1),
               border-color .45s ease,
               opacity .35s ease;
  }
  .state-highlighter.hidden{opacity:0}

  /* Paused mode: show all buttons with their own colored borders */
  .state-btn.paused-border{
    transition:color .35s ease,border-color .35s ease;
  }
  .state-btn.paused-border[data-state="idle"]{border-color:#aaaaaa;color:#aaaaaa}
  .state-btn.paused-border[data-state="thinking"]{border-color:#ff8830;color:#ff8830}
  .state-btn.paused-border[data-state="executing"]{border-color:#3399ff;color:#3399ff}
  .state-btn.paused-border[data-state="input_needed"]{border-color:#ee3333;color:#ee3333}
  .state-btn.paused-border[data-state="completed"]{border-color:#33cc55;color:#33cc55}
  .state-btn.paused-border[data-state="compacting"]{border-color:#9944ff;color:#9944ff}

  /* ── Auto-play bar ─────────────────────────────────────────── */
  .auto-play-bar{
    display:flex;align-items:center;gap:14px;justify-content:center;
  }
  .auto-play-btn{
    display:flex;align-items:center;gap:6px;
    padding:6px 14px;border:1px solid rgba(255,255,255,0.12);border-radius:18px;
    background:transparent;color:#666;font-size:13px;cursor:pointer;
    transition:all .3s;font-family:inherit;
  }
  .auto-play-btn:hover{color:#aaa;border-color:rgba(255,255,255,0.28)}
  .auto-play-btn.playing{color:#888;border-color:rgba(255,255,255,0.18)}
  .auto-play-btn.paused{color:#ee5555;border-color:rgba(238,85,85,0.35)}
  .auto-play-btn svg{transition:opacity .3s}

  /* ── Install section ───────────────────────────────────────── */
  .install-section{
    margin-top:40px;text-align:left;
    width:520px;max-width:90vw;
  }
  .install-section h2{font-size:22px;font-weight:600;color:#888;letter-spacing:10px;margin-bottom:22px;text-align:center}
  .install-platforms{display:flex;flex-direction:column;align-items:flex-start;gap:14px}
  .install-platform{
    width:100%;
    background:rgba(255,255,255,0.025);
    border:1px solid rgba(255,255,255,0.08);border-radius:12px;
    padding:20px 24px;text-align:left;
  }
  .install-platform.mac{
    border-style:dashed;border-color:rgba(255,255,255,0.05);
    background:rgba(255,255,255,0.015);
  }
  .platform-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .platform-header .platform-icon{color:#888;display:flex}
  .platform-header .platform-name{font-size:15px;font-weight:700;color:#bbb;letter-spacing:0.5px}
  .install-platform.mac .platform-header .platform-name{color:#777}
  .install-steps{display:flex;flex-direction:column;gap:14px}
  .install-step{display:flex;flex-direction:column;gap:5px}
  .install-step .step-label{font-size:12px;color:#555;letter-spacing:2px;text-transform:uppercase;font-weight:600}
  .install-step code{
    display:block;font-size:12px;color:#999;line-height:1.6;
    padding:8px 12px;background:rgba(0,0,0,0.25);border-radius:6px;
    font-family:"Cascadia Code","Fira Code","SF Mono",monospace;
    word-break:break-all;
  }
  .platform-coming{
    font-size:14px;color:#555;padding:8px 0;
    text-align:center;letter-spacing:3px;
  }

  footer{
    color:#3a3a3a;font-size:13px;letter-spacing:1px;
  }

  /* ── GitHub button ─────────────────────────────────────────── */
  .github-link{
    margin-top:4px;margin-bottom:12px;
  }
  .github-btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:8px 20px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;
    background:rgba(255,255,255,0.03);color:#666;font-size:13px;
    text-decoration:none;transition:all .3s;font-family:inherit;
  }
  .github-btn:hover{color:#ccc;border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.06)}
  .github-btn svg{color:#888}
</style>
</head>
<body>

<header>
  <h1>Claude Halo</h1>
  <p>陪伴每一次思考</p>
</header>

<div class="canvas-wrap">
  <canvas id="halo"></canvas>
</div>

<div class="state-label" id="stateLabel">待命 Idle</div>
<div class="state-desc" id="stateDesc"></div>

<div class="state-picker" id="statePicker">
  <div class="state-highlighter" id="stateHighlighter"></div>
  <button class="state-btn" data-state="idle">待命</button>
  <button class="state-btn" data-state="thinking">思考</button>
  <button class="state-btn" data-state="executing">执行</button>
  <button class="state-btn" data-state="input_needed">等待</button>
  <button class="state-btn" data-state="completed">完成</button>
  <button class="state-btn" data-state="compacting">压缩</button>
</div>

<div class="auto-play-bar">
  <button class="auto-play-btn playing" id="autoPlayBtn" title="暂停自动播放">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    <span>自动播放</span>
  </button>
</div>

<div class="install-section">
  <h2>安装</h2>
  <div class="install-platforms">
    <div class="install-platform">
      <div class="platform-header">
        <div class="platform-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
        <div class="platform-name">Windows</div>
      </div>
      <div class="install-steps">
        <div class="install-step">
          <div class="step-label">添加市场</div>
          <code>/plugin marketplace add Houyusu/claude-halo</code>
        </div>
        <div class="install-step">
          <div class="step-label">安装插件</div>
          <code>/plugin install claude-halo-win@claude-halo</code>
        </div>
      </div>
    </div>
    <div class="install-platform mac">
      <div class="platform-header">
        <div class="platform-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
        <div class="platform-name">macOS</div>
      </div>
      <div class="platform-coming">还未上线</div>
    </div>
  </div>
</div>

<div class="github-link">
  <a class="github-btn" href="https://github.com/Houyusu/claude-halo" target="_blank" rel="noopener">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
    GitHub
  </a>
</div>

<footer>Claude Halo</footer>

<script>
(function () { "use strict";

// ═══════════════════════════════════════════════════════════════════════
// Render engine (standalone — adapted from halo.js)
// ═══════════════════════════════════════════════════════════════════════

function hexRgb(h) {
  var m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
  return m ? [parseInt(m[1],16),parseInt(m[2],16),parseInt(m[3],16)]:[255,255,255];
}
function lerp(a,b,t){return a+(b-a)*t}
function lerpRgb(a,b,t){return[Math.round(lerp(a[0],b[0],t)),Math.round(lerp(a[1],b[1],t)),Math.round(lerp(a[2],b[2],t))]}
function rgba(r,g,b,a){return"rgba("+r+","+g+","+b+","+a+")"}

var CONFIGS = {
  idle:         {color:"#aaaaaa",halo:"#cccccc",period:6.0,dashes:[60,30],               ms:0,  md:0,   amin:0.30,amax:0.42,br:0,  rp:0,   rpperiod:0,   label:"待命 Idle",          desc:"等待输入 · 低存在感灰白慢速旋转"},
  thinking:     {color:"#ff8830",halo:"#ffdbb8",period:2.4,dashes:[70,35,45,30,25,20],   ms:0.6,md:0.4, amin:0.45,amax:0.90,br:5.2,rp:0,   rpperiod:0,   label:"思考 Thinking",       desc:"正在推理 · 琥珀色呼吸辉光"},
  executing:    {color:"#3399ff",halo:"#bbddff",period:1.3,dashes:[50,25,20,20,35,25,25,22],ms:1.2,md:0.28,amin:0.60,amax:0.90,br:0,  rp:0,   rpperiod:0,   label:"执行 Executing",      desc:"执行工具调用 · 蓝色高速旋转"},
  input_needed: {color:"#ee3333",halo:"#ffcccc",period:2.8,dashes:[80,50,30,25],          ms:1.8,md:0.5, amin:0.52,amax:0.94,br:2.0,rp:0,   rpperiod:0,   label:"等待输入 Input Needed",desc:"需要用户响应 · 红色呼吸提醒"},
  completed:    {color:"#33cc55",halo:"#bbffcc",period:5.0,dashes:[70,35,45,30,25,20],   ms:0.5,md:0.3, amin:0.38,amax:0.84,br:6.0,rp:0,   rpperiod:0,   label:"已完成 Completed",     desc:"任务完成 · 绿色柔和呼吸"},
  compacting:   {color:"#9944ff",halo:"#ddccff",period:2.1,dashes:[35,20,35,20,35,20],   ms:0.4,md:0.25,amin:0.38,amax:0.80,br:4.0,rp:0.12,rpperiod:1.6, label:"压缩 Compacting",     desc:"上下文压缩 · 紫色半径脉冲"},
};

var STATE_ORDER = ["idle", "thinking", "executing", "input_needed", "completed", "compacting"];
var AUTO_INTERVAL = 3500;

var MORPH_DURATION = 420;
var ENTRY_DURATION = 550;

var canvas = document.getElementById("halo");
var ctx = canvas.getContext("2d");
var time=0, lastT=null, rafId=null;

var targetState = "idle";
var currentState = "idle", currentCfg = CONFIGS.idle;
var morphFrom=null, morphStart=0, morphActive=false;

var lifecycle="entering", entryStart=null;
var pulseSettleStart=0, PULSE_SETTLE_DELAY=0.20, PULSE_RAMP_DURATION=0.50;

function resize(){
  var dpr=window.devicePixelRatio||1;
  var w=canvas.clientWidth, h=canvas.clientHeight;
  canvas.width=w*dpr;canvas.height=h*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();window.addEventListener("resize",resize);

function morphDashArrays(a,b,t){
  var nA=a.length/2, nB=b.length/2;
  var nFloat=lerp(nA,nB,t), nDraw=Math.max(1,Math.ceil(nFloat));
  var result=[];
  var totalA=a.reduce(function(s,v){return s+v},0), totalB=b.reduce(function(s,v){return s+v},0);
  var totalTarget=lerp(totalA,totalB,t);
  for(var i=0;i<nDraw;i++){
    var frac=i/nDraw;
    var ia=Math.floor(frac*nA)%nA, ib=Math.floor(frac*nB)%nB;
    var dl=lerp(a[ia*2],b[ib*2],t), gl=lerp(a[ia*2+1],b[ib*2+1],t);
    var bs=nDraw<=nFloat?1:1-(nDraw-nFloat);bs=Math.max(0.02,bs);
    result.push(dl*bs,gl*bs);
  }
  var cur=result.reduce(function(s,v){return s+v},0);
  if(cur>0){var sc=totalTarget/cur;for(var j=0;j<result.length;j++)result[j]*=sc}
  return result;
}

function morphConfig(a,b,t){
  return {
    color:lerpRgb(hexRgb(a.color),hexRgb(b.color),t),
    halo:lerpRgb(hexRgb(a.halo),hexRgb(b.halo),t),
    period:lerp(a.period,b.period,t), ms:lerp(a.ms,b.ms,t), md:lerp(a.md,b.md,t),
    amin:lerp(a.amin,b.amin,t), amax:lerp(a.amax,b.amax,t),
    br:lerp(a.br,b.br,t), rp:lerp(a.rp,b.rp,t), rpperiod:lerp(a.rpperiod,b.rpperiod,t),
    dashes:morphDashArrays(a.dashes,b.dashes,t),
  };
}

function drawRing(cx,cy,R,cfg,alphaMul,timeOff){
  if(alphaMul<=0.001)return;
  var t=time+(timeOff||0);
  var mainRgb=Array.isArray(cfg.color)?cfg.color:hexRgb(cfg.color);
  var haloRgb=Array.isArray(cfg.halo)?cfg.halo:hexRgb(cfg.halo);

  var breathe=0;
  if(cfg.br>0){var ph=(t%cfg.br)/cfg.br;breathe=Math.max(0,Math.sin(ph*Math.PI*2))}
  var alpha=(cfg.br>0?cfg.amin+(cfg.amax-cfg.amin)*breathe:cfg.amax)*alphaMul;

  var offset=((t/cfg.period)*Math.PI*2)%(Math.PI*2);
  var rawSum=cfg.dashes.reduce(function(a,b){return a+b},0);

  var haloLw=Math.max(R*0.28,1.5), haloAngExt=haloLw/R, minGap=haloAngExt*1.20;

  var rawAngles=[];
  for(var i=0;i<cfg.dashes.length;i++){
    var morph=Math.sin(t*cfg.ms+i*2.1);
    var ang=(cfg.dashes[i]/rawSum)*Math.PI*2;
    if(i%2===0){ang*=1+cfg.md*morph;ang=Math.max(0.02,ang)}
    else{ang*=1-cfg.md*0.5*morph;ang=Math.max(minGap,ang)}
    rawAngles.push(ang);
  }
  var dashTotal=0,gapTotal=0;
  for(var j=0;j<rawAngles.length;j++){if(j%2===0)dashTotal+=rawAngles[j];else gapTotal+=rawAngles[j]}
  var dashTarget=Math.PI*2-gapTotal, dashScale=dashTotal>0.001?dashTarget/dashTotal:1;

  var cumul=0;
  for(var k=0;k<rawAngles.length;k++){
    var ang=k%2===0?rawAngles[k]*dashScale:rawAngles[k];
    var a0=cumul-offset, a1=a0+ang;cumul+=ang;
    if(k%2===1)continue;

    ctx.strokeStyle=rgba(haloRgb[0],haloRgb[1],haloRgb[2],alpha*0.55);
    ctx.lineWidth=haloLw;ctx.lineCap="round";
    ctx.beginPath();ctx.arc(cx,cy,R,a0,a1,false);ctx.stroke();

    var mid=lerpRgb(haloRgb,mainRgb,0.5);
    ctx.strokeStyle=rgba(mid[0],mid[1],mid[2],alpha*0.85);
    ctx.lineWidth=Math.max(R*0.16,1);ctx.lineCap="round";
    ctx.beginPath();ctx.arc(cx,cy,R,a0,a1,false);ctx.stroke();

    ctx.strokeStyle=rgba(mainRgb[0],mainRgb[1],mainRgb[2],alpha);
    ctx.lineWidth=Math.max(R*0.10,1);ctx.lineCap="round";
    ctx.beginPath();ctx.arc(cx,cy,R,a0,a1,false);ctx.stroke();
  }
}

function drawGlowBridge(cx,cy,R,a,b,t){
  var ga=Math.sin(t*Math.PI)*0.32;if(ga<0.005)return;
  var midRgb=lerpRgb(hexRgb(a.color),hexRgb(b.color),t);
  ctx.strokeStyle=rgba(midRgb[0],midRgb[1],midRgb[2],ga*0.22);
  ctx.lineWidth=Math.max(R*0.50,3.5);ctx.lineCap="round";
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2,false);ctx.stroke();
  ctx.strokeStyle=rgba(midRgb[0],midRgb[1],midRgb[2],ga*0.40);
  ctx.lineWidth=Math.max(R*0.22,1.8);ctx.lineCap="round";
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2,false);ctx.stroke();
}

function radiusPulseFactor(cfg,tNow){
  if(!cfg.rp||cfg.rpperiod<=0)return 1;
  if(pulseSettleStart<=0)return 1;
  var elapsed=tNow-pulseSettleStart;if(elapsed<0)return 1;
  var ramp=Math.min(1,Math.max(0,elapsed-PULSE_SETTLE_DELAY)/PULSE_RAMP_DURATION);
  var erp=cfg.rp*(1-Math.pow(1-ramp,3));if(erp<=0.001)return 1;
  return 1+erp*Math.sin((tNow%cfg.rpperiod)/cfg.rpperiod*Math.PI*2);
}

function frame(ts){
  rafId=null;
  if(!lastT)lastT=ts;
  var dt=(ts-lastT)/1000;
  if(dt<=0)dt=0.016;else if(dt>0.1)dt=0.1;
  lastT=ts;time+=dt;

  var w=canvas.clientWidth, h=canvas.clientHeight;
  var cx=Math.floor(w/2), cy=Math.floor(h/2);
  var baseR=Math.min(w,h)*0.38;

  var entryScale=1,entryAlpha=1;
  if(lifecycle==="entering"){
    if(!entryStart)entryStart=ts;
    var raw=Math.min((ts-entryStart)/ENTRY_DURATION,1);
    var c1=1.70158;var eb=1+(c1+1)*Math.pow(raw-1,3)+c1*Math.pow(raw-1,2);
    entryScale=0.2+0.8*eb;entryAlpha=1-Math.pow(1-raw,3);
    if(raw>=1)lifecycle="active";
  }

  var ringScale=entryScale, ringAlpha=entryAlpha;

  var activeCfg=morphActive?morphConfig(morphFrom,CONFIGS[targetState],Math.min((ts-morphStart)/MORPH_DURATION,1)):currentCfg;
  var rpF=radiusPulseFactor(activeCfg,time);
  var RR=baseR*ringScale*rpF;

  ctx.clearRect(0,0,w,h);

  if(lifecycle==="active"&&targetState!==currentState&&!morphActive){
    pulseSettleStart=0;
    morphFrom=currentCfg;morphStart=ts;morphActive=true;
  }

  if(lifecycle!=="active"){
    drawRing(cx,cy,RR,currentCfg,ringAlpha,0);
  }else if(morphActive){
    var elapsed=ts-morphStart, rawM=Math.min(elapsed/MORPH_DURATION,1);
    var tE=rawM<0.5?2*rawM*rawM:1-Math.pow(-2*rawM+2,2)/2;
    var interp=morphConfig(morphFrom,CONFIGS[targetState],tE);
    drawRing(cx,cy,RR,interp,ringAlpha,0);
    drawGlowBridge(cx,cy,RR,morphFrom,CONFIGS[targetState],tE);
    if(rawM>=1){
      morphActive=false;currentState=targetState;currentCfg=CONFIGS[targetState];morphFrom=null;
      if(CONFIGS[targetState].rp>0)pulseSettleStart=time+0.06;
    }
  }else{
    drawRing(cx,cy,RR,currentCfg,ringAlpha,0);
  }

  if(lifecycle!=="closed"){rafId=requestAnimationFrame(frame)}
}

// ═══════════════════════════════════════════════════════════════════════
// Sliding highlighter
// ═══════════════════════════════════════════════════════════════════════

var highlighter = document.getElementById("stateHighlighter");

function moveHighlighter(stateName){
  var btn = document.querySelector('.state-btn[data-state="' + stateName + '"]');
  var picker = document.getElementById("statePicker");
  if (!btn || !picker || !highlighter) return;
  var br = btn.getBoundingClientRect();
  var pr = picker.getBoundingClientRect();
  highlighter.style.left   = (br.left - pr.left) + "px";
  highlighter.style.top    = (br.top  - pr.top)  + "px";
  highlighter.style.width  = br.width  + "px";
  highlighter.style.height = br.height + "px";
  highlighter.style.borderColor = CONFIGS[stateName].color;
}

// Initial position & description
moveHighlighter("idle");
document.getElementById("stateDesc").textContent = CONFIGS["idle"].desc;

// Update on resize (buttons may wrap)
window.addEventListener("resize", function(){
  moveHighlighter(targetState);
});

function setState(name){
  if(targetState===name)return;
  targetState=name;
  // Button text color
  document.querySelectorAll(".state-btn").forEach(function(b){
    var active = b.dataset.state === name;
    if (!autoPlaying) {
      // Paused mode: .paused-border handles color via CSS
    } else {
      b.style.color = active ? CONFIGS[name].color : "";
    }
  });
  var lb=document.getElementById("stateLabel");
  lb.textContent=CONFIGS[name].label;
  lb.className="state-label "+name;
  // Description text
  var sd=document.getElementById("stateDesc");
  sd.textContent=CONFIGS[name].desc || "";
  // Slide highlighter (only when playing)
  if (autoPlaying) moveHighlighter(name);
}
window.setState=setState;

// ═══════════════════════════════════════════════════════════════════════
// Auto-play
// ═══════════════════════════════════════════════════════════════════════

var autoPlayTimer = null;
var autoPlaying = true;
var autoIdx = 0;

function autoAdvance(){
  if (!autoPlaying) return;
  autoIdx = (autoIdx + 1) % STATE_ORDER.length;
  var next = STATE_ORDER[autoIdx];
  morphFrom = morphActive ? morphConfig(morphFrom, CONFIGS[targetState], Math.min((performance.now()-morphStart)/MORPH_DURATION, 1)) : currentCfg;
  morphStart = performance.now(); morphActive = true;
  pulseSettleStart = 0;
  setState(next);
  scheduleNext();
}

function scheduleNext(){
  if (autoPlayTimer) clearTimeout(autoPlayTimer);
  if (!autoPlaying) return;
  autoPlayTimer = setTimeout(autoAdvance, AUTO_INTERVAL);
}

function toggleAutoPlay(){
  autoPlaying = !autoPlaying;
  var btn = document.getElementById("autoPlayBtn");
  var svg = btn.querySelector("svg");
  if (autoPlaying) {
    btn.className = "auto-play-btn playing";
    btn.title = "暂停自动播放";
    btn.querySelector("span").textContent = "自动播放";
    svg.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    // Switch to sliding highlighter mode
    highlighter.classList.remove("hidden");
    document.querySelectorAll(".state-btn").forEach(function(b){
      b.classList.remove("paused-border");
      b.style.color = "";
    });
    // Restore current state color on active button, reposition highlighter
    document.querySelectorAll(".state-btn").forEach(function(b){
      var active = b.dataset.state === targetState;
      b.style.color = active ? CONFIGS[targetState].color : "";
    });
    moveHighlighter(targetState);
    autoIdx = STATE_ORDER.indexOf(targetState);
    scheduleNext();
  } else {
    btn.className = "auto-play-btn paused";
    btn.title = "恢复自动播放";
    btn.querySelector("span").textContent = "已暂停";
    if (autoPlayTimer) clearTimeout(autoPlayTimer);
    svg.innerHTML = '<polygon points="7,5 18,12 7,19"/>';
    // Switch to static colored-borders mode
    highlighter.classList.add("hidden");
    document.querySelectorAll(".state-btn").forEach(function(b){
      b.classList.add("paused-border");
      // CSS handles color via .paused-border[data-state] rules
    });
  }
}

document.getElementById("autoPlayBtn").addEventListener("click", toggleAutoPlay);

// ═══════════════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════════════

rafId=requestAnimationFrame(frame);

setTimeout(function(){
  scheduleNext();
}, ENTRY_DURATION + 200);

document.getElementById("statePicker").addEventListener("click",function(e){
  var btn=e.target.closest(".state-btn");
  if(!btn)return;
  if(targetState===btn.dataset.state)return;
  morphFrom=morphActive?morphConfig(morphFrom,CONFIGS[targetState],Math.min((performance.now()-morphStart)/MORPH_DURATION,1)):currentCfg;
  morphStart=performance.now();morphActive=true;
  pulseSettleStart=0;
  setState(btn.dataset.state);
  autoIdx = STATE_ORDER.indexOf(btn.dataset.state);
  if (!autoPlaying) return;
  scheduleNext();
});

})();
</script>
